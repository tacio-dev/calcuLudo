<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcuLudo | Calculadora Simples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculadora">
        <div class="titulo">CalcuLudo</div>
        <div class="resultado">
            0
        </div>
        <div class="botoes">
        <div class="linha-botao">
            <button class="botao-calc duplo C">C</button>
            <button class="botao-calc larr">&larr;</button>
            <button class="botao-calc">&divide;</button>           
        </div>

        <div class="linha-botao">
            <button class="botao-calc">7</button>
            <button class="botao-calc">8</button>
            <button class="botao-calc">9</button>
            <button class="botao-calc">&times;</button>           
        </div>

        <div class="linha-botao">
            <button class="botao-calc">4</button>
            <button class="botao-calc">5</button>
            <button class="botao-calc">6</button>
            <button class="botao-calc">&minus;</button>           
        </div>

        <div class="linha-botao">
            <button class="botao-calc">1</button>
            <button class="botao-calc">2</button>
            <button class="botao-calc">3</button>
            <button class="botao-calc">&plus;</button>           
        </div>

        <div class="linha-botao">
            <button class="botao-calc duplo">0</button>
            <button class="botao-calc">.</button>
            <button class="botao-calc igual">&equals;</button>            
        </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
